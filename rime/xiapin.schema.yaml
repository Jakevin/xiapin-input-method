# Rime schema
# encoding: utf-8

schema:
  schema_id: xiapin
  name: "蝦拼"
  version: "0.1.0"
  author:
    - "蝦拼輸入法 project"
  description: |
    Experimental Pinyin plus openxiami root schema.

switches:
  - name: ascii_mode
    reset: 0
    states: ["中文", "西文"]
  - name: full_shape
    states: ["半形", "全形"]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - script_translator@pinyin
  filters:
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz[];'"
  delimiter: " '"

translator:
  dictionary: xiapin.extended
  enable_sentence: false
  enable_user_dict: false
  enable_completion: true
  initial_quality: 1000

pinyin:
  dictionary: luna_pinyin
  enable_sentence: true
  enable_user_dict: false
  initial_quality: 100
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

punctuator:
  import_preset: default

key_binder:
  bindings:
    - { when: composing, accept: Control+p, send: Up }
    - { when: composing, accept: Control+n, send: Down }
    - { when: composing, accept: Control+b, send: Left }
    - { when: composing, accept: Control+f, send: Right }
    - { when: composing, accept: Control+a, send: Home }
    - { when: composing, accept: Control+e, send: End }
    - { when: composing, accept: Control+d, send: Delete }
    - { when: composing, accept: Control+h, send: BackSpace }
    - { when: composing, accept: Control+g, send: Escape }
    - { when: composing, accept: Control+bracketleft, send: Escape }
    - { when: composing, accept: Control+v, send: Page_Down }
    - { when: composing, accept: Alt+v, send: Page_Up }
    - { when: has_menu, accept: space, send: space }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
    - { when: always, accept: Shift+space, select: xiapin_english }
    - { when: always, accept: Control+Shift+grave, select: .next }
    - { when: always, accept: Control+grave, select: .next }

recognizer:
  import_preset: default

ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Shift_L: commit_code
    Shift_R: commit_code
    Control_L: noop
    Control_R: noop
    Caps_Lock: clear
    Eisu_toggle: clear
