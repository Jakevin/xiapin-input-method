# Rime schema
# encoding: utf-8

schema:
  schema_id: xiapin_english
  name: "蝦拼英文"
  version: "0.1.0"
  author:
    - "蝦拼輸入法 project"
  description: |
    English candidate mode for 蝦拼.
    This is not ascii_mode; it keeps Rime candidates available for English prefixes.

switches:
  - name: full_shape
    states: ["半形", "全形"]

engine:
  processors:
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz"
  delimiter: " '"

translator:
  dictionary: xiapin_English
  enable_sentence: false
  enable_user_dict: false
  enable_completion: true
  initial_quality: 1000

punctuator:
  import_preset: default
  half_shape:
    ",": {commit: ","}
    .: {commit: "."}

key_binder:
  bindings:
    - { when: composing, accept: Control+p, send: Up }
    - { when: composing, accept: Control+n, send: Down }
    - { when: composing, accept: Control+b, send: Left }
    - { when: composing, accept: Control+f, send: Right }
    - { when: composing, accept: Control+a, send: Home }
    - { when: composing, accept: Control+e, send: End }
    - { when: composing, accept: Control+d, send: Delete }
    - { when: composing, accept: Control+h, send: BackSpace }
    - { when: composing, accept: Control+g, send: Escape }
    - { when: composing, accept: Control+bracketleft, send: Escape }
    - { when: composing, accept: Control+v, send: Page_Down }
    - { when: composing, accept: Alt+v, send: Page_Up }
    - { when: has_menu, accept: space, send: space }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
    - { when: always, accept: Control+Shift+grave, select: .next }
    - { when: always, accept: Control+grave, select: .next }

recognizer:
  import_preset: default
